name: Publish Release

# Triggered when release.ps1 pushes a tag like v0.30.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Verify the server builds cleanly on CI ─────────────────────────────────
  verify:
    name: Verify server build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Server

      - name: Build
        run: dotnet build Server -c Release --no-restore

      - name: Test
        run: dotnet test ServerTest -c Release --verbosity minimal

  # ── Attach a note to the GitHub release pointing to the uploaded assets ─────
  annotate:
    name: Annotate release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Mark release as verified
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" \
            --prerelease=false \
            --latest=true \
            --notes-file LMP_0.30_2026.md \
            || echo "Release edit skipped (may not exist yet)"
