<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Multiplayer — Mission Control</title>
    <style>
        :root {
            --bg:       #0d0f14;
            --panel:    #151820;
            --border:   #2a2d3a;
            --text:     #c8c8c8;
            --dim:      #666872;
            --green:    #5cdd3e;
            --orange:   #f0a030;
            --blue:     #7cb8ff;
            --red:      #e05050;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── TOP BAR ─────────────────────────────────────── */
        #topbar {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 44px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #topbar .logo {
            color: var(--green);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #topbar .logo span { color: var(--orange); }
        #topbar .stats {
            margin-left: auto;
            display: flex;
            gap: 24px;
            color: var(--dim);
            font-size: 12px;
        }
        #topbar .stats b { color: var(--green); }
        #conn-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 3px;
            margin-left: 16px;
        }
        #conn-status.ok   { color: var(--green); border: 1px solid var(--green); }
        #conn-status.err  { color: var(--red);   border: 1px solid var(--red);   }
        #conn-status.wait { color: var(--dim);   border: 1px solid var(--border); }

        /* ── MAIN LAYOUT ─────────────────────────────────── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── TELEMETRY PANEL ─────────────────────────────── */
        #telemetry-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }
        #telemetry-panel .section-head {
            padding: 8px 16px;
            font-size: 11px;
            font-weight: bold;
            color: var(--orange);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }
        #table-wrap {
            flex: 1;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            position: sticky;
            top: 0;
            background: #0d0f14;
            color: var(--blue);
            font-size: 11px;
            letter-spacing: 0.5px;
            padding: 8px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-weight: normal;
        }
        tbody tr { border-bottom: 1px solid #1e2028; }
        tbody tr:hover { background: #1a1d26; }
        tbody td { padding: 9px 14px; }

        .td-player { color: var(--blue); }
        .td-vessel { color: var(--text); }
        .td-type   { color: var(--dim); font-size: 11px; }
        .td-body   { color: var(--orange); }
        .td-coords { color: var(--dim); font-size: 11px; }
        .td-speed  { color: var(--green); }
        .td-alt    { color: var(--text); }

        .type-icon { margin-right: 4px; }
        .dot-online { color: var(--green); }

        .empty-row td {
            text-align: center;
            padding: 48px;
            color: var(--dim);
            font-style: italic;
        }

        /* ── CHAT PANEL ──────────────────────────────────── */
        #chat-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            flex-shrink: 0;
        }
        #chat-panel .section-head {
            padding: 8px 16px;
            font-size: 11px;
            font-weight: bold;
            color: var(--orange);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-msg { line-height: 1.5; }
        .chat-msg .time  { color: var(--dim); font-size: 11px; }
        .chat-msg .from  { color: var(--blue); font-weight: bold; }
        .chat-msg .text  { color: var(--text); }
        .chat-msg.server .from { color: var(--orange); }
        #chat-input-row {
            display: flex;
            border-top: 1px solid var(--border);
            padding: 8px;
            gap: 6px;
        }
        #chat-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            padding: 5px 8px;
            border-radius: 2px;
            outline: none;
        }
        #chat-input:focus { border-color: var(--orange); }
        #chat-send {
            background: #1e3a1e;
            color: var(--green);
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 2px;
        }
        #chat-send:hover { background: #2a5a2a; }

        /* ── Scrollbar ───────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Loading overlay ─────────────────────────────── */
        #loading {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 999;
            transition: opacity 0.4s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>

<div id="topbar">
    <div class="logo">◈ LUNA <span>MULTIPLAYER</span> — MISSION CONTROL</div>
    <div class="stats">
        <span>VESSELS: <b id="vessel-count">0</b></span>
        <span>UPDATED: <b id="last-update">--:--:--</b></span>
        <span id="conn-status" class="wait">CONNECTING…</span>
    </div>
</div>

<div id="main">
    <!-- ── TELEMETRY ──────────────────────────────────────── -->
    <div id="telemetry-panel">
        <div class="section-head">◈ ACTIVE VESSELS</div>
        <div id="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>PLAYER</th>
                        <th>VESSEL</th>
                        <th>TYPE</th>
                        <th>BODY</th>
                        <th>POSITION</th>
                        <th>ALT (m)</th>
                        <th>SPEED (m/s)</th>
                    </tr>
                </thead>
                <tbody id="vessel-rows">
                    <tr class="empty-row"><td colspan="7">Awaiting telemetry…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── CHAT ───────────────────────────────────────────── -->
    <div id="chat-panel">
        <div class="section-head">◈ COMM CHANNEL</div>
        <div id="chat-messages"></div>
        <div id="chat-input-row">
            <input id="chat-input" type="text" placeholder="Message players…" maxlength="200">
            <button id="chat-send">SEND</button>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    const TYPE_ICONS = {
        Ship:    '🚀', Probe: '🛸', Rover: '🚗', Lander: '🛬',
        Station: '🛰', Base:  '🏗', Debris: '💥', Plane: '✈',
        Flag:    '🚩', EVA:   '🧑‍🚀', SpaceObject: '☄',
    };

    function typeIcon(t) { return TYPE_ICONS[t] || '◉'; }
    function esc(s) {
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(v, dp) {
        const n = parseFloat(v);
        return isNaN(n) ? '—' : n.toFixed(dp);
    }

    // ── Connection status ──────────────────────────────────────────────────
    const connEl = document.getElementById('conn-status');
    function setConnOk()  { connEl.className = 'ok';   connEl.textContent = 'CONNECTED'; }
    function setConnErr() { connEl.className = 'err';  connEl.textContent = 'NO SIGNAL';  }
    function setConnWait(){ connEl.className = 'wait'; connEl.textContent = 'CONNECTING…'; }

    // ── Telemetry — reads telemetry.json (static file written by server) ───
    // Delta tracking: only re-render when LastUpdate changes.
    let lastTelemetryUpdate = null;

    async function fetchTelemetry() {
        try {
            // Cache-bust so the browser always fetches the latest file
            const r = await fetch('/telemetry.json?_=' + Date.now());
            if (!r.ok) { setConnErr(); return; }

            const d = await r.json();
            setConnOk();

            // Delta check: skip re-render if nothing changed
            const serverUpdate = d.LastUpdate ?? null;
            if (serverUpdate !== null && serverUpdate === lastTelemetryUpdate) return;
            lastTelemetryUpdate = serverUpdate;

            const rows   = document.getElementById('vessel-rows');
            const cCount = document.getElementById('vessel-count');
            const cTime  = document.getElementById('last-update');

            // TotalPlayers from server context, Players is the detailed list
            const players = d.Players || [];
            cCount.textContent = d.TotalPlayers ?? players.length;
            cTime.textContent  = new Date().toLocaleTimeString();

            if (players.length === 0) {
                rows.innerHTML = '<tr class="empty-row"><td colspan="7">No vessels in range</td></tr>';
                return;
            }

            rows.innerHTML = players.map(p => `
                <tr>
                    <td class="td-player"><span class="dot-online">●</span> ${esc(p.PlayerName)}</td>
                    <td class="td-vessel">${esc(p.VesselName)}</td>
                    <td class="td-type"><span class="type-icon">${typeIcon(p.VesselType)}</span>${esc(p.VesselType)}</td>
                    <td class="td-body">${esc(p.Body)}</td>
                    <td class="td-coords">${fmt(p.Lat, 2)}° / ${fmt(p.Lon, 2)}°</td>
                    <td class="td-alt">${fmt(p.AltitudeASL, 0)}</td>
                    <td class="td-speed">${fmt(p.Speed, 1)}</td>
                </tr>
            `).join('');
        } catch (e) {
            setConnErr();
            console.warn('Telemetry fetch failed:', e);
        }
    }

    // ── Chat — reads chat.json (static file) + POST via api/chat ──────────
    let lastChatCount = 0;

    async function fetchChat() {
        try {
            const r = await fetch('/chat.json?_=' + Date.now());
            if (!r.ok) return;

            const d = await r.json();
            const msgs = d.Messages || [];
            if (msgs.length === lastChatCount) return;
            lastChatCount = msgs.length;

            const box = document.getElementById('chat-messages');
            const atBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 20;

            box.innerHTML = msgs.map(m => {
                const time     = new Date(m.Timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isServer = m.From === '[Server]';
                return `<div class="chat-msg ${isServer ? 'server' : ''}">
                    <span class="time">[${time}]</span>
                    <span class="from"> ${esc(m.From)}</span>
                    <span class="text">: ${esc(m.Text)}</span>
                </div>`;
            }).join('');

            if (atBottom) box.scrollTop = box.scrollHeight;
        } catch (e) {
            console.warn('Chat fetch failed:', e);
        }
    }

    async function sendChat() {
        const inp  = document.getElementById('chat-input');
        const text = inp.value.trim();
        if (!text) return;
        inp.value = '';
        try {
            // POST goes directly to the live API endpoint
            const body = new URLSearchParams({ text });
            const r = await fetch('/api/chat', { method: 'POST', body });
            if (r.ok) {
                // Refresh chat immediately from the POST response
                const d = await r.json();
                const msgs = d.Messages || [];
                if (msgs.length !== lastChatCount) {
                    lastChatCount = msgs.length;
                    const box = document.getElementById('chat-messages');
                    box.innerHTML = msgs.map(m => {
                        const time     = new Date(m.Timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const isServer = m.From === '[Server]';
                        return `<div class="chat-msg ${isServer ? 'server' : ''}">
                            <span class="time">[${time}]</span>
                            <span class="from"> ${esc(m.From)}</span>
                            <span class="text">: ${esc(m.Text)}</span>
                        </div>`;
                    }).join('');
                    box.scrollTop = box.scrollHeight;
                }
            }
        } catch (e) {
            console.warn('Chat send failed:', e);
        }
    }

    // ── Init ───────────────────────────────────────────────────────────────
    document.getElementById('chat-send').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendChat();
    });

    // Initial load (fast)
    fetchTelemetry();
    fetchChat();

    // Poll: telemetry every 1.5 s (delta check skips re-render if unchanged)
    //       chat every 2 s
    setInterval(fetchTelemetry, 1500);
    setInterval(fetchChat, 2000);

    // Dismiss loading overlay
    document.getElementById('loading').classList.add('hidden');
})();
</script>
</body>
</html>
